<svg width="760" height="540" viewBox="0 0 760 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#cdfb45" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#cdfb45" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="220" y1="60" x2="520" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dffb6e"/>
      <stop offset="1" stop-color="#9fdb0a"/>
    </linearGradient>
    <linearGradient id="handle" x1="450" y1="330" x2="640" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#cdfb45"/>
      <stop offset="1" stop-color="#5e7a13"/>
    </linearGradient>
    <filter id="ds" x="60" y="20" width="640" height="520" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <circle cx="350" cy="210" r="240" fill="url(#glow)"/>

  <g filter="url(#ds)" transform="rotate(-16 350 210)">
    <!-- outer hoop -->
    <ellipse cx="350" cy="200" rx="128" ry="150" fill="none" stroke="url(#frame)" stroke-width="17"/>
    <ellipse cx="350" cy="200" rx="106" ry="128" fill="#0d100d" stroke="#1c2218" stroke-width="2"/>

    <!-- main strings (vertical) -->
    <g stroke="#cdfb45" stroke-width="1.6" opacity="0.7">
      <line x1="296" y1="83" x2="296" y2="317"/>
      <line x1="323" y1="76" x2="323" y2="324"/>
      <line x1="350" y1="73" x2="350" y2="327"/>
      <line x1="377" y1="76" x2="377" y2="324"/>
      <line x1="404" y1="83" x2="404" y2="317"/>
    </g>
    <!-- cross strings (horizontal) -->
    <g stroke="#cdfb45" stroke-width="1.6" opacity="0.55">
      <line x1="248" y1="150" x2="452" y2="150"/>
      <line x1="240" y1="175" x2="460" y2="175"/>
      <line x1="236" y1="200" x2="464" y2="200"/>
      <line x1="240" y1="225" x2="460" y2="225"/>
      <line x1="248" y1="250" x2="452" y2="250"/>
    </g>

    <!-- throat -->
    <path d="M310 330 L350 358 L390 330" fill="none" stroke="url(#frame)" stroke-width="15" stroke-linecap="round"/>
    <!-- handle -->
    <rect x="338" y="350" width="24" height="150" rx="12" fill="url(#handle)"/>
    <rect x="338" y="430" width="24" height="60" rx="12" fill="#0a0c0a" opacity="0.35"/>
  </g>
</svg>
